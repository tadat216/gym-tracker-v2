services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: gym_tracker_test
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - dev

  backend-dev:
    build:
      context: ./backend
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gymtracker:secret@postgres:5432/gym_tracker
      TEST_DATABASE_URL: postgresql+asyncpg://gymtracker:secret@postgres-test:5432/gym_tracker_test
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  frontend-dev:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - frontend/.env
    profiles:
      - dev

  backend-prod:
    build:
      context: ./backend
      target: prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gymtracker:secret@postgres:5432/gym_tracker
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - prod

  frontend-prod:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    profiles:
      - prod

volumes:
  pgdata:
  pgdata-test:
